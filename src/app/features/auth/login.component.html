<!-- login.component.html -->
<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <i class="fas fa-tooth"></i>
      <h1>LAB.ROSAS</h1>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Usuario</mat-label>
        <input matInput formControlName="nombre_usuario" placeholder="Ingrese su usuario">
        <mat-icon matSuffix>person</mat-icon>
        <mat-error *ngIf="loginForm.get('nombre_usuario')?.hasError('required')">
          El usuario es requerido
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Contraseña</mat-label>
        <input matInput [type]="hidePassword ? 'password' : 'text'" 
               formControlName="contrasena" 
               placeholder="Ingrese su contraseña">
        <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
          <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
        </button>
        <mat-error *ngIf="loginForm.get('contrasena')?.hasError('required')">
          La contraseña es requerida
        </mat-error>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid">
        <i class="fas fa-shield-halved"></i> INGRESAR
      </button>
    </form>
  </div>
</div>
