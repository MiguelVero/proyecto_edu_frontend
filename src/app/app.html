<!-- Navbar de navegación que aparece solo cuando el usuario está autenticado -->
<nav class="navbar" *ngIf="authService.isAuthenticated()">
  <div class="nav-container">
    <a routerLink="/dashboard" class="nav-brand">
      <i class="fas fa-microchip"></i> LabTrack Pro
    </a>
    
    <!-- Botón hamburguesa para móvil -->
    <button class="menu-toggle" (click)="toggleMenu()" [class.active]="menuOpen">
      <i class="fas" [ngClass]="{'fa-bars': !menuOpen, 'fa-times': menuOpen}"></i>
    </button>
    
    <!-- Overlay para cerrar al hacer clic fuera -->
    <div class="menu-overlay" *ngIf="menuOpen" (click)="closeMenu()"></div>
    
    <div class="nav-menu" [class.open]="menuOpen">
      <!-- Botón de cierre eliminado -->
      
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item" (click)="closeMenu()">
        <i class="fas fa-chart-pie"></i> Dashboard
      </a>
      <a routerLink="/ordenes" routerLinkActive="active" class="nav-item" (click)="closeMenu()">
        <i class="fas fa-clipboard-list"></i> Órdenes
      </a>
      <a routerLink="/doctores" routerLinkActive="active" class="nav-item" (click)="closeMenu()">
        <i class="fas fa-user-doctor"></i> Doctores
      </a>
      <a routerLink="/servicios" routerLinkActive="active" class="nav-item" (click)="closeMenu()">
        <i class="fas fa-tooth"></i> Servicios
      </a>
      <a routerLink="/reportes" routerLinkActive="active" class="nav-item" (click)="closeMenu()">
        <i class="fas fa-chart-bar"></i> Reportes
      </a>
      <div class="nav-actions">
        <button class="theme-toggle" (click)="toggleTheme(); closeMenu()" title="Cambiar tema">
          <i class="fas" [ngClass]="{'fa-moon': currentTheme === 'dark', 'fa-sun': currentTheme === 'light'}"></i>
        </button>
        <button class="btn-logout" (click)="authService.logout()">
          <i class="fas fa-sign-out-alt"></i> Salir
        </button>
      </div>
    </div>
  </div>
</nav>

<!-- Contenido principal -->
<main>
  <router-outlet></router-outlet>
</main>
